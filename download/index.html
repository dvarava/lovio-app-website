<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="../assets/icon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>Download Lovio</title>
    <meta name="description" content="Download Lovio for iOS or Android.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@400;500;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
    <script>
        const IOS_STORE_URL = "https://apps.apple.com/app/lovio-couples-app-widgets/id6743631737";
        const HOME_URL = "https://getlovio.app";
        const ANDROID_PACKAGE = "com.fourplex.lovio";

        function getAndroidStoreUrl() {
            return "https://play.google.com/store/apps/details?id=" + encodeURIComponent(ANDROID_PACKAGE);
        }

        function redirect() {
            const ua = navigator.userAgent || navigator.vendor || window.opera || "";
            const isAndroid = /android/i.test(ua);
            const isIOS = /iPad|iPhone|iPod/.test(ua) ||
                (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);

            if (isAndroid) {
                window.location.href = getAndroidStoreUrl();
                return;
            }

            if (isIOS) {
                window.location.href = IOS_STORE_URL;
                return;
            }

            window.location.href = HOME_URL;
        }

        window.addEventListener("DOMContentLoaded", redirect);
    </script>
</head>

<body>
    <div class="container">
        <header>
            <a href="../index.html" class="logo">
                <img src="../assets/logo.png" alt="Lovio Logo" class="logo-img">
                lovio
            </a>
            <nav class="links">
                <a href="../support.html">Support</a>
                <a href="../feedback.html">Feedback</a>
            </nav>
        </header>

        <main>
            <div class="page-header">
                <h1>Download Lovio</h1>
                <p>Redirecting you to the right store...</p>
            </div>

            <div class="content-section glass-panel contact-card">
                <h2>Still here?</h2>
                <p>If the redirect does not start, use the store link for your device.</p>

                <div class="download-cta-group">
                    <a href="https://apps.apple.com/app/lovio-couples-app-widgets/id6743631737" class="app-store-btn"
                        aria-label="Download on the App Store">
                        <svg viewBox="0 0 384 512" fill="currentColor" class="apple-logo" aria-hidden="true">
                            <path
                                d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z" />
                        </svg>
                        <div class="btn-text">
                            <span class="btn-subtitle">Download on the</span>
                            <span class="btn-title">App Store</span>
                        </div>
                    </a>
                    <a href="https://play.google.com/store/apps/details?id=com.fourplex.lovio"
                        class="btn btn-primary">Google Play</a>
                </div>

                <noscript>
                    <p style="margin-top: 2rem;">JavaScript is disabled, so automatic store detection cannot run.</p>
                </noscript>
            </div>
        </main>
    </div>
</body>

</html>
